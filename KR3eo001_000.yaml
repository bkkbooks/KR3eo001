body:
  text: 上籍食治養老益氣方第一一法制豬肚方食治老人補虛羸乏氣力獖豬肚二枚洗如食法人參半兩去蘆乾薑二錢炮製銼椒二錢去目不開口者微炒蔥白七莖去須切糯米二合上件搗為末入米合和相得入豬肚內縫合勿令泄氣以水五升於鐺內微火煮令爛熟空心服放溫服之次暖酒一中盞飲之益氣牛乳方牛乳最宜老人性平補血脈益心長肌肉令人身體康強潤澤面目光悅志不衰故為人子者常須供之以為常食或為乳餅或作斷乳等恆使恣意充足為度此物勝肉遠矣枸杞煎方食治老人頻遭病虛羸不可平復最宜服之生枸杞根細銼一斗以水五斗煮取一斗五升澄清白羊脊骨一具銼碎上件藥以微火煎取五升去滓取入瓷閣中每服一合與酒一少盞合暖每於食前溫服法煮羊頭方食治老人補五勞七傷虛損白羊頭蹄一副草火燒令黃色刮去灰塵胡椒半兩蓽茇半兩乾薑半兩蔥白切半升豆豉半斤上件藥先以水煮羊頭蹄半熟納藥更煮令爛去骨空腹適性食之日食一具滿七具即止禁生冷醋滑五辛陳臭豬雞等七日煎豬肪方食治老人大虛羸困極宜服豬肪未中水者半斤上入蔥白一莖於銚內煎令蔥黃即止候冷暖如身體空腹頻服之令盡暖蓋覆臥至日晡後乃白粥調糜過三日後宜服羊肝羹羊肝羹方羊肝一具去筋膜細切羊脊𦟘肉二條細切枸杞根五斤銼以水一斗五升煮取四升去滓粬末半兩上用枸杞汁煮前羊肝等令爛入豉一小盞蔥白七莖切以五味調和作羹空腹食之後三日慎食如上法油麵餺飥方食治老人補虛勞生胡麻油一斤浙粳米泔清一斤上二味以微火煎盡泔清乃止出貯之取合鹽湯二合將和麵作餺飥煮令熟入五味食之二食治老人補虛益氣牛乳方牛乳五升蓽茇末一兩上件藥入銀器內以水三升和乳合煎取三升後入瓷閣中每於食前暖一小盞服之食治老人養老以藥水飲牛取乳服食方鍾乳一斤上好者細研人參三兩去蘆頭甘草五兩炙微赤銼乾地黃三兩黃耆二兩銼杜仲三兩去皺皮用肉蓯蓉六兩白茯苓五兩麥門冬四兩去心薯蕷六兩石斛二兩去根銼上藥為末以水三斗先煮粟米七升為粥放盆內用藥一兩攪令勻少和冷水與渴牛飲之令足不足更飲之一日飲時患渴不飲清水平旦取牛乳服之生熟任意牛須三歲以上七歲以下純黃色者為上余色為下其乳常令犢子飲之若犢子不飲者其乳動氣不堪服也慎蒜豬魚生冷陳臭其乳牛清潔養之洗刷飲飼須如法用心看之增補方劑千金翼方耆婆湯主大虛冷風羸弱無顏色方一云酥蜜湯酥一斤煉生薑一合切薤白三握炙令黃酒二升白蜜一斤煉油一升椒一合汗胡麻仁一升橙葉一握炙令黃豉一升糖一升上一十一味先以酒漬豉一宿去滓納糖蜜油酥於銅器中煮令勻沸次納薤薑煮令熟次下椒橙葉胡麻煮沸下二升豉汁又煮一沸出內瓷器中密封空腹吞一合如人行十里更一服冷者加椒鄒氏三妙湯實氣養血久服彌益人地黃枸杞實各取汁一升蜜半升銀器中同煎如稀餳每服一大匕湯調酒調皆可鄒氏山芋粥薯蕷生於山者名山藥一名山芋山芋生山者佳圃種者無味取去皮細石上磨如糊每碗粥用山芋一合以酥二合蜜一合同炒令凝以匙揉碎粥欲熟投攪令勻乃出嶽美中氏參耆粥食治老人元氣不足脾胃虛弱氣短自汗語音低怯面色㿠白食少便溏神疲懶動四肢無力易患感冒舌淡胖苔淨脈緩弱者黨參三十克黃耆三十克白朮十五克茯苓十五克炙甘草十五克上五味加水八百毫升煎至六百毫升去滓下粳米二兩煮粥四百毫升清晨頓服之每日一次常服有益氣力補虛弱健脾胃之效食治老人眼目方第二一補肝豬肝羹方食治老人肝藏虛弱遠視無力豬肝一具細切去筋膜蔥白一握去須切雞子二枚上以豉汁中煮作羹臨熟打破雞子投在內食之又方青羊肝一具細切水煮熟漉酒干以鹽醋調和食之又方蔥子半升炒熟上為末每服一匙以水二大盞煎取一盞去滓入米煮粥食之馬齒實方食治老人青白翳明目除邪氣利大腸去寒熱馬齒實一斤上為末每服一匙煮蔥豉粥和攪食之馬齒菜作羹粥吃並明目極佳烏雞肝粥方食治老人肝藏風虛眼暗烏雞肝一具細切上以豉中和米作羹粥食之蒼耳子粥方食治老人目暗不明蒼耳子半兩粳米半升上件搗蒼耳子爛用布絞濾以水二升取汁和米煮粥食之或作散煎服亦佳蓮實粥方食治老人益耳目聰明補中強志蓮實半兩去皮細切糯米三合上先以水煮蓮實令熟漉出次入糯米作粥候熟入蓮實攪令勻熱食之竹葉粥方食治老人膈上風熱頭目赤痛目視䀮䀮竹葉五十片淨洗石膏三兩沙糖一兩浙粳米三合上以水三大盞煎石膏等二味取二盞去滓澄清用煮粥熟入沙糖食之二食治老人熱發眼赤澀痛梔子仁粥方梔子仁一兩上為末分為四服每服用米三合煮粥臨熟時下梔子末一分攪令勻食之食治老人益精氣強意志聰利耳目雞頭實粥方雞頭實三合上煮令熟去殼研如膏入粳米一合煮粥空腹食食治老人補中明目利小便蔓菁粥方蔓菁子二合粳米三合上搗碎入水二大盞絞濾取汁著米粥空心食之增補方劑備急千金要方補肝散治失明漠漠方青羊肝一具去上膜薄切之以新瓦瓶子未用者淨拭之內肝於中炭火上炙之令極干汁盡末之決明子半升蓼子一合熬令香上三味合治下篩以粥飲食後服方寸匕日二稍加至三匕不過兩劑能一歲服之可夜讀細書食治老人耳聾耳鳴諸方第三一磁石豬腎羹方食治老人久患耳聾養腎臟強骨氣磁石一斤杵碎水淘去赤汁用綿裹豬腎一對去脂膜細切上以水五升煮磁石取二升去磁石投腎調和以蔥豉薑椒作羹空腹食之作粥及入酒並得磁石常留起依前法用之鹿腎粥方食治老人腎氣虛損耳聾鹿腎一對去脂膜切粳米三合上於豉汁中相和煮作粥入五味如法調和空腹食之作羹及作酒並得鯉魚腦髓粥方食治老人耳聾不瘥鯉魚腦髓二兩粳米三合上煮粥以五味調和空腹服之豬腎粥方食治老人腎藏氣憊耳聾豬腎一兩去膜細切蔥白二莖去須切人參一分去蘆頭防風一分去蘆頭粳米二合薤白七莖去須上件藥末並米蔥薤白著水鍋中煮候粥臨熟撥開中心下腎莫攪動慢火更煮良久入五味空腹服之二食治老人五臟氣壅耳聾烏雞膏粥方烏雞脂一兩粳米三合上相和煮粥入五味調和空腹食之烏雞脂和酒飲亦佳補充方劑太平聖惠方治耳聾及不聞香臭乾柿粥方乾柿三枚細切粳米三合上於豉汁中煮粥空腹食之食治老人五勞七傷諸方第四一暖腰壯陽道藥餅子方食治老人五勞七傷下焦虛冷小便遺精宜食之附子一兩炮製去皮臍神麯三兩桂心一兩五味子一兩乾薑二兩炮製銼羊髓二兩大棗二十枚煮去皮核酥二兩蜜四兩白麵一斤黃牛乳一斤半肉蓯蓉一兩半酒浸一宿刮去皺皮炙乾菟絲子一兩酒浸三日曝乾為末漢椒半兩去目及閉口者微炒去汗上為末入面以酥蜜髓乳相和入棗瓤熟搜於盤中蓋覆勿令通風半日久即將出更搜令熟擀作糊餅大面上以箸挑之即入爐䂪中上下以火爆令熟每日空腹食五枚一方入酵和更佳雌雞粥方食治老人五勞七傷益下元壯氣海服經月餘肌肉充盛老成少年並宜服食黃雌雞一隻去毛臟腹肉蓯蓉酒浸一宿一兩刮去皺皮切生薯蕷一兩切阿魏少許煉過粳米二合淘入以上先將雞爛煮擘骨取汁下米及雞肉蓯蓉等都煮粥入五味空心食之羊腎蓯蓉羹方食治老人五勞七傷陽氣衰弱腰腳無力宜食羊腎一對去筋膜脂細切肉蓯蓉一兩酒浸一宿刮去皺皮細切上件藥和作羹著蔥白鹽五味末等一如常法空腹服之二食治老人五勞七傷陽氣衰弱強益氣力鹿腎粥方鹿腎一對去脂膜細切肉蓯蓉二兩酒浸一宿刮去皮切粳米二合上件藥先以水二盞煮米作粥欲熟下鹿腎蓯蓉蔥增補方劑聖惠方治五勞七傷庶事衰弱枸杞粥方枸杞菜半斤切粳米二合上件以豉汁相和煮作粥以五味蔥白等調和食之聖惠方治五勞七傷陰囊下濕癢蘿藦菜粥方蘿藦菜半斤羊腎一對去脂膜粳米二合上細切煮粥調和如常法空腹食之聖惠方治五勞七傷陰萎氣弱雞肝粥方雄雞肝一具切菟絲子末半兩一粟米二合上以水二大盞半入五味及蔥煮作粥空心食之食治老人虛損羸瘦諸方第五雀兒粥方食治老人臟腑虛損羸瘦陽氣乏弱雀兒五隻治如食法細切粟米一合蔥白三莖切上先將雀兒炒肉次入酒一合煮少時入水二大盞半下米煮作粥欲熟下蔥白五味等候熟空心服之骨汁煮餅方食治老人虛損羸瘦下焦久冷眼昏耳聾大羊尾骨一條以水五大盞煮取汁二大盞五分蔥白五莖去須切面三兩陳橘皮一兩湯浸去白穰焙羊肉四兩細切荊芥一握上件藥都用骨汁煮五七沸去滓用汁少許後溲麵作索餅卻於汁中與羊肉煮入五味空腹服之羊肉粥方食治老人虛損羸瘦助陽壯筋骨羊肉二斤黃耆一兩生銼人參一兩去蘆頭白茯苓一兩棗五枚粳米二合上件藥先將肉去脂皮取精膂肉留四兩細切餘一斤十二兩以水五大盞並黃耆等煎取汁三盞去滓入米煮粥臨熟下切了生肉更煮入五味調和空心食之雞子索餅方食治老人虛損羸瘦令人肥白光澤白麵四兩雞子四兩白羊肉四兩炒作臛上件以雞子清溲麵作索餅於豉汁中煮令熟入五味和臛空腹食之石英水煮粥方食治老人腎氣損陰萎固痹風濕肢節中痛不可持物白石英二十兩磁石三十兩捶碎上件藥以水二斗器中浸於露地安置夜則揭蓋令得星月氣每日取水作羹粥及煎茶湯吃皆用之用卻一升即添一升如此經年諸風並瘥氣力強盛顏如童子增補方劑聖惠方治五臟虛損羸瘦益氣力堅筋骨苣蕂粥方苣蕂子不限多少揀去雜蒸曝各九遍上每取二合用湯浸布裹挼去皮再研水濾取汁煎成飲著粳米作粥食之或煎濃飲澆索餅食之甚佳食治老人脾胃氣弱方第六一羊肉索餅方食治老人脾胃氣弱不多食四肢困乏無力黃瘦白羊肉四兩白麵六兩生薑汁一合上以薑汁溲麵肉切作臛頭下五味椒蔥煮熟空心食之日一服如常作益準藿菜羹方食治老人脾胃氣弱飲食不多羸乏少力藿菜四兩切之鯽魚肉五兩上煮作羹下五味椒薑並調少面空心食之常以三五日服極補益釀豬肚方食治老人脾胃氣弱不能飲食多困無力豬肚一個肥者淨洗之人參末半兩橘皮末半兩豬脾二枚細切飯半碗蔥白半握上總納豬肚中相和入椒醬五味訖縫口合蒸之令爛熟空心漸食之能作三兩劑兼補勞雞子餺飥方食治老人脾胃氣弱不多進食行步無力黃瘦氣微見食即欲吐雞子三枚白麵五兩白羊肉五兩作臛頭上件以雞子白溲麵如常法作之以五味煮熟空心食之日一服常作極補虛曲末索餅子方食治老人脾胃氣弱食不消化羸瘦舉動無力多臥曲末二兩搗為面白麵五兩生薑汁三兩白羊肉二兩作臛頭上以薑汁搜曲末和麵作之加羊肉臛頭及下醬椒五味煮熟空心食之日一服常服尤益羊脊骨粥方食治老人脾胃氣弱勞損不下食大羊脊骨一具肥者捶碎青粱米四合淘淨上以水五升煎取二升汁下米煮作粥空心食之可下五味常服其功難及甚效粟米粥方食治老人脾胃虛弱嘔吐不下食漸加羸瘦粟米四合淨淘白麵四兩上以粟米杵面令勻煮作粥空心食之日二服極養腎氣和胃黃雌雞餛飩方食治老人脾胃氣弱痿瘦黃雌雞肉五兩白麵七兩蔥白二合切細上以切肉作餛飩下椒醬五味調和煮熟空心食之日一服皆益臟腑悅澤顏