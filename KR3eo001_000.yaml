front:
  text: 序昔聖人詮置藥石療諸疾病者以其五臟本於五行五行有相生勝之理也榮衛本於陰陽陰陽有逆順之理也故萬物皆稟陰陽五行而生有五色焉有五味焉有寒熱焉有良毒焉聖人取其色味冷熱良毒之性歸之五行處以為藥以治諸疾順五行之氣者以相生之物為藥以養之逆五行之氣者以相勝之物為藥以攻之或瀉母以利子或瀉子以補母此用藥之奇法也經曰天地萬物之盜人萬物之盜人所以盜萬物為資養之法其水陸之物為飲食者不啻千品其五色五味冷熱補瀉之性亦皆稟於陰陽五行與藥無殊大體用藥之法以冷治熱以熱治冷實則瀉之虛則補之此用藥之大要也人若能知其食性調而用之則倍勝於藥也緣老人之性皆厭於藥而喜於食以食治疾勝於用藥況是老人之疾慎於吐痢尤宜用食以治之凡老人有患宜先食治食治未愈然後命藥此養老人之大法也是以善治病者不如善慎疾善治藥者不如善治食今以食醫心鏡食療本草詮食要法諸家法饌洎是注太平聖惠方食治諸法類成養老食治方各開門目用治諸疾具列於下為人子者宜留意焉承奉郎前守泰州興化縣令陳直述
