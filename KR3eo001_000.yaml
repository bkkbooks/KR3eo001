鹽湯方鹽末一合沸湯一升上以鹽末納湯中調頻令服盡須臾當吐吐即瘥食治老人冷氣心痛薑橘皮湯方生薑一兩切陳橘皮一兩炙為末上以水一升煎取七合去滓空心食之日三兩服尤益食治老人冷氣心痛鬱結兩脅脹滿高良薑粥方高良薑二兩切以水二升煎取一升半汁青粱米四合研淘上以薑汁煮粥空心食之日一服極益效食治老人冷氣心痛發動時遇冷風即痛蓽茇粥方蓽茇末二合胡椒末一分青粱米四合淘上以煮作粥熟下二味調之空心食常服尤效食治老人冷氣逆心痛結舉動不得乾薑酒方乾薑末半兩清酒六合上溫酒熱即下椒末投酒中頓服之立愈增補方劑食治老人血虛冷氣內侵腹中拘急綿綿作痛喜得溫按及寒疝腹中痛脅痛裡急者當歸生薑羊肉湯方當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之食治老人諸痔方第十五一鯉魚鱠方食治老人痔下血久不瘥漸加黃瘦無力鯉魚肉十兩切作膾如常法上以蒜醋五味空心常食之日一服瘥忌鮓甜食野豬肉羹方食治老人五痔久不愈生瘡疼痛野豬肉一斤細切蔥白一握米二合細研上煮作羹下五味調和椒薑空心漸食之常作極效鮎魚方食治老人五痔血下不瘥肛門腫痛漸瘦鮎魚肉一斤蔥白半把上以白水煮令熟空心以蒜醋五味漸漸食之常作尤佳二食治老人痔病下血不止肛門腫貓貍羹方貓貍一兩如常法治上細切以面及蔥椒五味拌作片炙熟空心漸食之亦可作羹粥任性尤佳食治老人痔常下血身體壯熱不多食蒼耳粥方蒼耳子五合熟作水二升煎取一升半汁粳米四合淘上以前件煮作粥空心食之日常服亦可煎湯服之極效破氣明目食治老人痔病久不愈肛門腫痛鰻鱺魚臛方鰻鱺魚肉二斤切作臛蔥白半握細切上煮作臛下五味椒薑空心漸食之殺蟲尤佳食治老人痔病下血不止日加羸瘦無力鴝鵒散方鴝鵒五隻治洗令淨曝令乾上搗為散空心以白粥飲服二方寸匕日二服最驗亦可炙食任性食治老人五痔泄血不絶四肢衰弱不能下食杏仁飲方杏仁二兩去皮尖細研以水浸之粳米四合淘上以杏仁汁相和煮作飲空心食之日一服效食治老人五痔下血常煩熱羸瘦桑耳粥方桑耳二兩水三升煎取二升汁粳米四合淘上以桑耳汁煮作粥空心食之日一二服皆效食治老人五痔泄血不止積日困劣無氣鴛鴦法炙方鴛鴦一枚如常法上以五味椒醬醃火炙之令熟空心漸食之亦療久瘻瘡絶驗增補方劑老人痔瘡下血久不止或自潰出膿血痔核腫痛虛羸自汗右脈虛大無力者黃耆粥方主之黃耆一兩細切刺蝟皮五錢炙粳米二兩淘淨上以水兩大碗先煎黃耆刺蝟皮至一碗半去滓下米煮粥空腹食之每日一次食治老人諸風方第十六一麻子飲方食治老人中風汗出四肢頑痹言語不利麻子五合熬細研水淹取汁粳米四合淨淘研之煮飲食之大豆酒方食治老人卒中風口噤身體反張不語大豆二升熬之清酒二升上熬豆令絶即下酒投之煮一二沸去滓頓服之覆臥汗瘥口噤拗灌之陰證急傷寒服此神效白羊頭方食治老人中風心神昏昧行即欲倒嘔吐白羊頭一具治如常法上以空心用薑醋漸食之為佳烏雞臛方食治老人中風煩熱言語澀悶手足熱烏雞半斤細切麻子汁五合蔥白一把上煮作臛次下麻汁五味薑椒令熟空心漸食之補益蒜煎食治老人中風邪毒臟腑壅塞手足緩弱大蒜一升去皮細切大豆黃炒二升上以水一升和二味微火煎之似稠即止空心每服食啖三二匙亦補腎氣補腎地黃酒方食治老人風濕痹筋攣骨痛潤皮毛益氣力補虛止毒除面皯宜服生地黃一升切大豆二升熬之生牛蒡根一升切上以絹袋盛之以酒一斗浸之五六日任性空心溫服三二盞恆作之尤佳雁脂酒方食治老人風攣拘急偏枯不通利雁脂五兩消之令散上每日空心溫酒一盞下脂半合許調頓服之巨勝酒方食治老人風虛痹弱四肢無力腰膝疼痛巨勝子二斤熬薏苡仁二升乾地黃半斤切上以絹袋貯無灰酒一斗漬之勿令泄氣滿五六日任性空心溫服一二盞尤益蒼耳茶方食治老人風冷痹筋脈緩急蒼耳子一升熟杵為末上每日煎服之代茶常服極治風熱明目槐茶方食治老人熱風下血明目益氣除邪治齒疼利臟腑氣宜食之槐葉嫩者五斤蒸令熟為片曬乾作茶搗羅為末上每日煎如茶法服之恆益除風尤佳二食治老人中風言語謇澀精神昏憒手足不仁緩弱不遂方葛粉五兩荊芥一握豉五合上以搜葛粉如常作之煎二味取汁煮之下蔥椒五味臛頭空心食之一二服將息為效忌豬肉蕎麵食治老人中風口面喎偏大小便祕澀煩熱荊芥粥方荊芥一把切青粱米四合淘薄荷葉半握切豉五合綿裹上以水煮取荊芥汁下米及諸味煮作粥入少鹽醋空心食之常服佳食治老人中風緩弱不仁四肢動搖無氣力炙熊肉方熊肉一斤切蔥白半握切醬椒等上以五味醃之炙熟空心冷食之恆服為佳亦可作羹粥任性食之尤佳食治老人中風口目瞤動煩悶不安牛蒡餺飥方牛蒡根切一升去皮曝乾杵為面白米四合淨淘研上以牛蒡粉和麵作之向豉汁中煮加蔥椒五味臛頭空心食之恆服極效食治老人中風頭旋目眩身體厥強筋骨疼痛手足煩熱心神不安烏驢頭方烏驢頭一枚炮去毛淨治之上以煮令爛熟細切空心以薑醋五味食之漸進為佳極除風熱其汁如釅酒亦醫前患尤效食治老人中風四肢不仁筋骨頑強蒼耳葉羹方蒼耳葉五兩切好嫩者豉心二合別煎上和煮作羹下五味椒薑調和空心食之尤佳食治老人中風熱毒心悶氣壅昏倒甘草豆方甘草一兩烏豆三合生薑半兩切上以水二升煎取一升去滓冷漸食服之極治熱毒食治老人風熱煩毒頑痹不仁五緩六急駝脂酒方野駝脂五兩煉之為上上空心酒五合下半匙已上調脂令消頓服之日二服極效下籍飲食調治第一主身者神養氣者精益精者氣資氣者食食者生民之天活人之本也故飲食進則穀氣充穀氣充則氣血盛氣血盛則筋力強故脾胃者五臟之宗也四臟之氣皆稟於脾故四時皆以胃氣為本生氣通天論云氣味辛甘發散為陽酸苦湧泄為陰是以一身之中陰陽運用五行相生莫不由於飲食也若少年之人真元氣壯或失於飢飽食於生冷以根本強盛未易為患其高年之人真氣耗竭五臟衰弱全仰飲食以資氣血若生冷無節飢飽失宜調停無度動成疾患凡人疾病未有不因八邪而感所謂八邪者風寒暑濕飢飽勞逸也為人子者得不慎之若有疾患且先詳食醫之法審其疾狀以食療之食療未愈然後命藥貴不傷其臟腑也凡百飲食必在人子躬親調治無縱婢使慢其所食老人之食大抵宜其溫熱熟軟忌其黏硬生冷每日晨朝宜以醇酒先進平補下元藥一服女人則平補血海藥一服無燥熱者良尋以豬羊腎粟米粥一杯壓之五味蔥薤鶉膂等粥皆可至辰時服人參平胃散一服然後次第以順四時軟熟飲食進之食後引行一二百步令運動消散臨臥時進化痰利膈人參半夏丸一服尊年之人不可頓飽但頻頻與食使脾胃易化穀氣長存若頓令飽食則多傷滿緣衰老人腸胃虛薄不能消納故成疾患為人子者深宜體悉此養老人之大要也日止可進前藥三服不可多餌如無疾患亦不須服藥但只調停飲食自然無恙矣形證脈候第二上古天真論曰女子之數七丈夫之數八女子七七四十九任脈虛衝脈衰天癸竭地道不通丈夫八八六十四五臟皆衰筋骨解墮天癸盡脈弱形枯女子過六十之期丈夫逾七十之年越天常數上壽之人若衣食豐備子孫勤養承順慈親參行孝禮能調其飲食適其寒溫上合神靈下契人理此順天之道也高年之人形羸氣弱理自當然其有丈夫女子年逾七十面色紅潤形氣康強飲食不退尚多祕熱者此理何哉且年老之人痿瘁為常今反此者非真陽血海氣壯也但診左右手脈須大緊數此老人延永之兆也老人真氣已衰此得虛陽氣盛充於肌體則兩手脈大飲食倍進雙臉常紅精神康健此皆虛陽氣所助也須時有煩渴膈熱大腑祕結但隨時以平常湯藥微微消解三五日間自然平復常得虛陽氣存自然飲食得進此天假其壽也切不得為有小熱頻用轉瀉之藥通利苦冷之藥疏解若虛陽氣退還復真體則形氣尫羸臟腑衰弱多生冷痰無由補復若是從來無虛陽之氣一向憊乏之人全在斟量湯劑常加溫補調停饘粥以為養治此養老之先也醫藥扶持第三常見世人治高年之人疾患將同年少亂投湯藥妄行針灸以攻其疾務欲速愈殊不知上壽之人血氣已衰精神減耗危若風燭百疾易攻至於視聽不至聰明手足舉動不隨其身體勞倦頭目昏眩風氣不順宿疾時發或祕或泄或冷或熱此皆老人之常態也不順治之緊用針藥務求痊瘥往往因此別緻危殆且攻病之藥或吐或汗或解或利緣衰老之人不同年少真氣壯盛雖汗吐轉利未至危困其老弱之人若汗之則陽氣泄吐之則胃氣逆瀉之則元氣脫立致不虞此養老之大忌也大體老人藥餌止是扶持之法只可用溫平順氣進食補虛中和之藥治之不可用市肆贖買他人惠送不知方味及狼虎之藥與之服餌切宜審詳若身有宿疾或時發動則隨其疾狀用中和湯藥順三朝五日自然無事然後調停飲食依食醫之法隨食性變饌治之此最為良也性氣好嗜第四眉壽之人形氣雖衰心亦自壯但不能隨時人事遂其所欲雖居處溫給亦常不足故多咨煎背執等間喜怒性氣不定止如小兒全在承奉顏色隨其所欲嚴戒婢使子孫不令違背若憤怒一作血氣虛弱中氣不順因而飲食便成疾患深宜體悉常令人隨侍左右不可令孤坐獨寢緣老人孤僻易於傷感才覺孤寂便生鬱悶養老之法凡人平生為性各有好嗜之事見即喜之有好書畫者有好琴棋者有好賭撲者有好珍奇者有好禽鳥者有好古物者有好佛事者有好丹灶者人之僻好不能備舉但以其平生偏嗜之物時為尋求擇其精純者布於左右使其喜愛玩悅不已老人衰倦無所用心若只令守家孤坐自成滯悶今見所好之物自然用心於物上日日看承戲玩自以為樂雖有勞倦咨煎性氣自然減可宴處起居第五凡人衰晚之年心力倦怠精神耗短百事懶於施為蓋氣血筋力之使然也全藉子孫孝養竭力將護以免非橫之虞凡行住坐臥宴處起居皆須巧立制度以助娛樂棲息之室必常潔雅夏則虛敞冬則溫密其寢寐床榻不須高廣比常之制三分減一低則易於升降狹則不容漫風裀褥厚藉務在軟平三面設屏以防風冷其枕宜用夾熟色帛為之實以菊花制在低長低則寢無罅風長則轉不落枕其所坐椅宜作矮襌床樣坐可垂足履地易於興居左右置欄面前設幾緣老人多困坐則成眠有所欄圍免閃側之傷其衣服制度不須寬長長則多有蹴絆寬則衣服不著身緣老人骨肉疏冷風寒易中若窄衣貼身暖氣著體自然血氣流利四肢和暢雖遇盛夏亦不可令袒露其頸後連項常用紫軟夾帛自頸後巾幘中垂下著肉入衣領中至背甲間以護腠理尊年人肌肉瘦怯腠理開疏若風傷腠中便成大患深宜慎之貧富禍福第六經曰自天子至於庶人孝無終始而患不及者未之有也人子以純孝之心竭力事親無終始不及之理惟供養之有厚薄由貧富之有分限人居富貴有厚於己而薄於親者人所不録天所不容雖處富貴而即貧賤也人雖居貧賤能約於己而豐於親者人所推仰天所助與雖處貧賤而即富貴也作善降之百祥作不善降之百殃善莫大於孝孝感於天故天與之福所以雖貧賤而即富貴也罪莫大於不孝不孝感於天故天與之禍所以雖富貴而即貧賤也善惡之報其猶影響為人子者可不信乎奉親之道亦不在日用三牲但能承順父母顏色盡其孝心隨其所有此順天之理也其溫厚之家不可慢於老者盡依養老之方勵力行之其貧下闕乏之家養老之法雖有奉行之心而無奉行之力者但隨家豐儉竭力於親約禮設具使老者知其罄力事奉而止將見孝心感格陰靈默佑如薑詩之躍鯉孟宗之泣筍無非孝感所致此行孝之驗也慮孝子順孫有窘乏不能依此法者意有不足故立此貧富禍福之説以齊之戒忌保護第七人萬物中一物也不能逃天地之數若天癸數窮則精血耗竭神氣浮弱返同小兒全假將護以助衰晚若遇水火兵寇非橫驚怖之事必先扶持老人於安穩處避之不可喧忙驚動尊年之人一遭大驚便致冒昧因生余疾凡喪葬凶禍不可令吊疾病危困不可令驚悲哀憂愁不可令人預報穢惡臭敗不可令食黏硬毒物不可令餐敝漏卑濕不可令居卒風暴寒不可令冒煩暑燠熱不可令中動作行步不可令勞暮夜之食不可令飽陰霧晦暝不可令飢假借鞍馬不可令乘偏僻藥餌不可令服廢宅敧宇不可令入墳園荒墓不可令遊危險之地不可令行澗淵之水不可令渡暗昧之室不可令孤凶禍遠報不可令知輕薄婢使不可令親家緣冗事不可令管若此事類頗多不克備舉但人子悉意深慮過為之防稍有不便於老人者皆宜忌之以保長年常宜遊息精蘭崇尚佛事使神識趣向一歸善道此養老之奇術也四時養老通用備疾藥法第八四氣調神論曰陰陽四時者萬物之終始死生之本也逆之則災害生從之則苛疾不起是謂得道春溫以生之夏熱以長之秋涼以收之冬寒以藏之若氣反於時則為疾癘此天之常道也順之則生逆之則病經曰觀天之道執天之行盡矣人若能執天道生殺之理法四時運用而行自然疾病不生長年可保其黃髮之人五臟氣虛精神耗竭若稍失節宣即動成危瘵蓋老人倦惰不能自調在人資養以延遐算為人子者深宜察其寒溫審其饘藥依四時攝養之方順五行休旺之氣恭恪奉親慎無懈怠今集老人四時通用備疾藥法具陳於下此方多用寒藥蓋北人所宜凡用藥者宜參處之四時通用男女婦人方治老人風熱上攻頭旋運悶喜臥怔悸起即欲倒背急身強旋覆花散女人通用旋覆花半兩前胡一兩麥門冬一兩去心蔓荊子半兩白朮二分枳殼二分去瓤麩炒甘菊花三分半夏半兩薑汁煮防風半兩大黃虛人者用石膏獨活半兩甘草半兩上為末每服三錢水一中盞入薑半分同煎至六分去滓溫服不計時候老人補壯筋骨治風走注疼痛並風氣上攻下疰羌活丸羌活牛膝酒浴過焙乾川楝子白附子舶上茴香黃耆去皮銼青鹽巴戟去心黑附子炮製去皮臍沙苑白蒺藜上件等分一處搗羅為末酒煮麵糊為丸如梧桐子大每服十丸空心臨臥鹽湯下看老少加減服老人和脾胃氣進飲食止痰逆療腹痛氣調中木香人參散男子女人通用木香半兩人參去蘆頭半兩茯苓去黑皮一分白朮半兩微炒肉豆蔻去皮一分枇杷葉去毛一分厚朴去粗皮薑汁製丁香半兩霍香葉一分甘草半兩炙乾薑半兩炮陳皮半兩湯浸去瓤上件一十二味修事了稱分兩搗羅為末每服二錢水一大盞入生薑錢一片棗二枚同煎至六分去滓溫服此藥老人常服合吃老人和脾胃氣治胸膈疰悶心腹刺痛不思飲食枳殼木香散男子女人通用木香一兩神麯杵末炒四兩荊三稜四兩炮青橘皮去瓤三兩甘草三兩炮益智去皮三兩白芷一兩桂心三兩莪朮三兩炮白朮微炒二兩枳殼麩炒炮上件藥搗羅為末每服二錢水一盞入生薑鹽各少許同煎至七分並滓熱服解老人四時傷寒四順散男子女人通用麻黃去節杏仁去皮甘草炙荊芥穗以上各等分上同杵為末每服一錢入鹽湯點熱服治老人心脾積熱或流注腳膝疼痛黃耆散男子女人通用黃耆赤芍藥牡丹皮香白芷沙參炙甘草炙肉桂去皮柴胡去苗當歸洗後炙上件等分搗羅為末每服二錢水一盞薑三片煎至五分日進二服春季每煎時入蜜蒸栝蔞煎半匙忌黏食炙爆等物橘皮煮散益元氣和脾胃治傷寒此名不換金散但心腹諸疾並用療之男子女人通用橘皮一兩去瓤稱用人參茯苓白朮各一兩木香一分乾薑炮官桂半兩去皮稱檳榔一兩雞心者用草豆蔻二個去皮半夏一分麩炒厚朴半兩入薑一分同杵碎炒乾枳殼半兩去瓤麩炒訶黎勒五個煨熟去核甘草半兩上件搗羅為末每服一大錢水一盞薑棗同煎至七分熱吃不問食前食後並宜服忌如常治老人臟腑冷熱不調裡急後重闌門不和香白芷散男子女人通用當歸三錢洗香白芷三錢洗茯苓三錢去皮枳殼三錢麩炒木香一錢上件為末每服一錢水半盞生薑少許同煎至四分溫服治老人大小便不通勻氣散通用生薑半兩蔥一莖和根葉泥用鹽一捻豉三十粒上件四味搗爛安臍中良久便通治老人小便不通地龍膏白項地龍茴香用時看多少上件杵汁傾於臍內自然便通治老人腳膝疼痛不能履地七聖散杜仲續斷萆薢防風獨活各一兩牛膝一兩酒浸一宿甘草一兩上件為末每服二錢酒調下治老人脾胃一切病溫白丸兼治脾不承受吐逆瀉痢及宿食不消男子女人通用半夏二兩湯洗薑汁浸白朮一兩炮丁香一分上件為末用生薑自然汁和飛面為糊搗和前藥末為丸如梧桐子大濃煎生薑湯下十丸空心服如腹疼並嘔逆食後服藁本散治婦人血氣丈夫筋骨風四肢軟弱及卒中急風並寸白蟲但長服並皆攻治或要出汗解傷寒湯使如後此方是孟相公進過藁本牛膝酒浸一宿焙乾當歸麻黃去節以上各一兩羌活獨活防風肉桂去粗皮稱芍藥菊花續斷五加皮芎藭甘草赤箭枳殼麩炒去瓤以上各半兩黑附子大者一個炮製去皮臍細辛一分去葉稱上件藥一十八味並須州土好者使水洗過細銼焙乾搗羅為末空心溫酒下二錢如不飲酒薄荷湯下發汗解傷寒熱蔥白酒下二錢並服三五服為妙治老人風冷展筋骨續斷散方續斷一兩牛膝二兩川芎一兩木瓜二兩上為細末空心時溫酒調下一大錢墜痰化涎和脾胃人參半夏丸半夏一兩生薑四兩取汁先以湯洗半夏七遍浸三日後於日內煎乾切作餅子焙乾白礬一兩人參一兩茯苓一兩去皮上為末以蒸餅水浸過卻用紙裹煨熟為丸如緑豆大每日空心夜臥用淡生薑湯下五十丸開胃口薑棗湯下風涎用皂角一條薑三片蘿蔔三片同煎湯下治老人暖食藥丁香丸消食治一切氣悶止醋心腹脹利胸膈逐積滯方男子婦人通用大烏梅一個須是有裙襴者巴豆一個新肥者和皮用香墨末炒半錢先炒為末桂花末炒半錢香墨末炒半錢香墨乾漆桂花末三味研入揀丁香五個須是新者用胡椒五粒須是黑者上為末用馬尾羅子羅過用醋麵糊為劑臼中杵令勻如緑豆大溫酒下五丸至七丸茶下亦得或入蠟茶末三錢更妙香草散治婦人氣羸腸寒便白食傷積滯冷結腸不成溫脾肺活榮生肌進食益衝任二經閭茹桔梗白芷當歸地榆芍藥檳榔白豆蔻各半兩麝香稱一錢上為末每服二錢水一盞薑棗同煎至數沸通口食前日進三分香枳湯治老人大腸祕澀調風順氣男子婦人通用枳殼去瓤麩炒防風各一兩甘草半兩炙上為末每服二錢百沸湯點服空心食前各一服治婦人男子久積虛敗壯元補血健胃暖脾止痰逆消飲食北亭丸北亭二兩去除砂石阿魏半兩同硇砂研令細醋化去沙石川當歸淨洗去苗稍用四兩厚朴去皮薑汁炙令黃色四兩陳橘皮去瓤用紅四兩官桂去皮稱四兩乾薑炮甘草炙川芎胡椒揀好者縮砂去皮用大附子炮去皮臍以上各稱四兩茯苓二兩青鹽二兩與硇砂阿魏同醋研去沙土白朮米泔水浸一宿切作片子焙乾五味子一兩半去沙土上件依法修事為末將硇砂阿魏醋入面看多少同煎稀糊下藥更煉好蜜同搜和拌勻再入臼中杵千百下丸如酸棗大每服一丸空心鹽湯茶酒任下嚼破女人一切病患並宜服此治老人一切風烏犀丸天麻二兩地榆一兩元參一兩川烏頭一兩炮製去皮龍腦薄荷四兩藿香葉一兩皂角三挺不蛀者燒紅入水中浸之龍腦少許麝香少許上為末煉蜜為膏如皂子大每服一丸嚼吃小兒半丸以下薄荷茶酒調下鎮心丸養老人心氣令不健忘聰耳明目方辰砂一兩桂一兩遠志去心人參以上各一兩茯苓二兩麥門冬去心石菖蒲乾地黃各一兩半以上除辰砂併為末合勻上煉蜜為丸如桐子大空心薄荷酒吞下十丸至十五丸留少硃砂為衣益心氣養神宜常服治老人脾肺客熱上焦滯痰涼心潤肺消壅枇杷葉散王昉進男子女人通用方枇杷葉炙去毛人參茯苓白朮羌活黃耆各一兩甘草炙半夏湯洗去滑切破焙乾各半兩上為末每服二錢水一盞入生薑薄荷煎至七分食後臨臥溫服羌活散治老人耳聾眼暗頭頂腰背疼痛渾身瘡癬此乃腎臟風所攻也羌活枳殼麩炒去瓤半夏湯浸七遍甘草炙大腹子洗防風桑白皮各等分上為粗末每服二錢水一盞生薑煎至七分溫服早辰日午時臨臥各一服搜風順氣治老人百疾七聖丸男子女人通用檳榔木香川芎羌活桂心各一兩郁李仁一兩去皮尖炒令黃色大黃一兩一分炒上為末煉蜜為丸桐子大不計時候溫酒下七丸要利動即加七丸淡薑湯下亦得春時攝養第九春屬木主發生宜戒殺茂於恩惠以順生氣春肝氣旺肝屬木其味酸木能勝土土屬脾主甘當春之時其飲食之味宜減酸益甘以養脾氣肝氣盛者調噓氣以利之順之則安逆之則少陽不生肝氣內變春時陽氣初升萬物萌發正二月間乍寒乍熱高年之人多有宿疾春氣所攻則精神昏倦宿患發動又復經冬已來擁爐熏衾啖炙飲熱至春成積多所發泄致體熱頭昏膈壅涎嗽四肢勞倦腰腳不任皆冬所發之疾也常宜體候若稍利恐傷臟腑別主和氣涼膈化痰之藥消解或只選食治方中性稍涼利飲食調停與進自然通暢若別無疾狀不須服藥常擇和暖日引侍尊親於園亭樓閣虛敞之處使放意登眺用攄滯懷以暢生氣時尋花木遊賞以快其意不令孤坐獨眠自生鬱悶春時若親朋請召老人意欲從歡任自遨遊常令嫡親侍從惟酒不可過飲春時人家多造冷饌米食等不令下與如水團兼粽黏冷肥僻之物多傷脾胃難得消化大不益老人切宜看承春時天氣燠暖不可頓減綿衣緣老人氣弱骨疏怯風冷易傷肌體但多穿夾衣過暖之時一重漸減一重即不致暴傷也今具春時湯藥如後春時用藥諸方治老人春時多昏倦細辛散明目和脾胃除風氣去痰涎男子女人通用細辛一兩去土川芎二兩甘草半兩炙上為末每服一大錢水一盞煎至六分熱呷可常服治老人春時熱毒風攻頸項頭痛面腫及風毒眼澀菊花散菊花前胡旋覆花芍藥元參苦參防風各等分上為末食後臨臥用溫酒調下三錢不飲酒用米飲調下亦得治老人春時頭目不利昏昏如醉壯熱頭疼有似傷寒惺惺丸通用桔梗細辛人參甘草茯苓栝蔞根白朮各一兩上為末煉蜜為丸如彈子大每服一丸溫水化破治頭痛腰痛藥入口當下便惺惺治老人春時多偏正頭疼神效方通用旋覆花一兩焙白殭蠶一兩炒石膏一分細研上件為末以蔥煨熟和根同杵為丸桐子大急痛用蔥茶下二丸慢痛不過二服治老人春時胸膈不利或時滿悶墜痰飲子半夏不計多少用湯水洗十遍為末生薑一大塊棗七枚上二味以水二盞藥末二錢慢火煎至七分臨臥時去生薑頻服老人春時宜吃延年草進食順氣御藥院常合進通用青橘皮四兩浸洗去瓤甘草二兩為細末鹽二兩半炒上三味先洗浸橘皮去苦水微焙入甘草同焙乾後入鹽每早晨嚼三兩葉子通滯氣大好治老人春時諸般眼疾發動黃耆散兼治口鼻生瘡黃耆川芎防風甘草白蒺藜略炒杵去尖出火毒以上各一兩甘菊花三分不得用新菊上淨洗曬乾勿更近火搗為末每服二錢早晨空心日午臨臥各一服乾咽或米飲調下暴赤風毒淚昏澀痛癢等眼只三服三兩日永效內外障眼久服方退忌房室毒物火上食凡患眼切不得頭上針烙出血及服皂角牽牛等藥取一時之快並大損眼治老人春時胸膈不利痰壅氣噎及咽喉諸疾黍黏湯方黍黏子三兩炒令香熟甘草半兩炙上為末搗羅細末每服一錢食後臨臥如常點之夏時攝養第十夏時屬火主於長養夏心氣旺心主火味屬苦火能剋金金屬肺肺主辛當夏之時宜減苦增辛以養肺氣心氣盛者調呵氣以疏之順之則安逆之則太陽不長心氣內洞盛夏之月最難治攝陰氣內伏暑毒外蒸縱意當風任性食冷故人多暴泄之患惟是老人尤宜保護若簷下過道穿隙破窗皆不可納涼此為賊風中人暴毒宜居虛堂淨室水次木陰潔淨之處自有清涼每日凌晨進溫平順氣湯散一服飲食溫軟不令太飽畏日長永但時復進之渴宜飲粟米溫飲豆蔻熟水生冷肥膩尤宜減之緣老人氣弱當夏之時納陰在內以陰弱之腹當冷肥之物則多成滑泄一傷正氣卒難補復切宜慎之若須要食瓜果之類量虛實少為進之緣老人思食之物若有違阻意便不樂但隨意與之才食之際以方便之言解之往往知味便休不逆其意自無所損若是氣弱老人夏至以後宜服不燥熱平補腎氣暖藥三二十服以助元氣若蓯蓉丸八味丸之類宜往潔雅寺院中擇虛敞處以其所好之物悅之若要寢息但任其意不可令久眠但時時令歇久則神昏直召年高相協之人日陪間話論往昔之事自然喜悅忘其暑毒細湯名茶時為進之晚涼方歸謹選夏時湯藥如後夏時用藥諸方治老人夏多冷氣發動胸膈氣滯噎塞脾胃不和不思飲食豆蔻散草豆蔻四兩以薑四兩炒香為度和薑用大麥柏子十兩炒黃神麯四兩炒黃杏仁四兩去尖炒熟甘草四兩炙乾薑二兩炮製上為末每服一錢如茶點之不計時候服治老人夏月宜服平補下元明目蓯蓉丸蓯蓉四兩巴戟二兩菊花二兩枸杞子二兩上為末煉蜜為丸桐子大每服鹽湯下二十丸治夏月暴發腹痛及泄瀉木香丸輕好全乾蠍二十個每個擘三兩段子於慢火上炒令黃熟揀好胡椒三百粒生木香一分上件藥同搗為末濕紙裹燒粟米飯為丸如緑豆大如患腹痛每服十五丸煎燈心陳橘皮生薑湯下大便不調及泄瀉每服十五丸煎陳橘皮湯下治老人夏月脾胃忽生冷氣心腹脹滿疼悶泄瀉不止訶子散訶子皮五個大腹五個去皮甘草半兩炙白朮半兩微炒草豆蔻十四個用麵裹燒令面熟黃去面並皮用人參去蘆頭半兩上為末每服二錢水一盞入生薑少許棗二個同煎至六分去滓溫服治老人夏月因食冷氣積滯或心腹疼痛等宜常服荊三稜三兩濕紙裹煨熟透別杵蓬莪朮二兩同上臺烏藥二兩益智去皮二兩甘草三兩炙陳橘皮二兩用厚朴亦得上為末每服入鹽點之不計時候一錢治老人夏月宜服三聖丸祛逐風冷氣進食和胃去痰滯腰膝冷痛威靈仙淨洗去土揀擇焙乾稱五兩乾薑二兩炮製烏頭二兩炮製去皮臍稱上件為末煮棗肉為丸如梧子大每服十五丸至二十丸溫薑湯下治老人夏月宜服平補楮實丸方駐顏壯筋骨補益元藏療積冷虛乏一切氣疾暖胃進酒食久服令人輕健此神效方楮實半斤輕杵去白及膜揀擇淨微微炒鹿茸四兩茄子茸為上其次亦得淨瓦上炙令黃色如無則鹿角屑代之亦妙大附子四兩炮去皮臍出火毒懷州牛膝四兩去蘆頭酒洗二宿焙紫巴戟四兩洗去心金叉石斛四兩去根揀淨細細切之川乾薑二兩炮製急於新水內淨過肉桂二兩去粗皮上件八味為末楮實子一味用砂盆別研二日令爛細後入前藥末同研拌令細勻入煮棗肉同研拌得所方入鐵臼杵二千下丸如桐子大每服三十丸溫酒下忌牛肉豉汁治老人百疾常服四順湯神麯四兩入生薑四兩去皮一處作餅子焙乾甘草一兩半炙黃草豆蔻一兩半先炮熟去皮細銼用大麥柏子二兩炒香熟上件為末鹽點之一錢婦人年老夏月平補血海活血去風五倍丸五倍子二兩川芎二兩銼細菊花二兩荊芥穗二兩旋覆花二兩上為末蜜為丸如桐子大每日空心五更晚食後鹽湯酒下十五丸吃至半月日覺見漸安手足有力眼目鮮明進得飲食大旺血海請每一日三服若見大段安樂一日只吃一服尤佳治老人脾胃弱不思飲食吐瀉霍亂理中丸人參甘草乾薑白朮各等分上為末煉蜜為丸桐子大每服十五丸食前服夏月消食和氣橘紅散陳橘皮一斤半湯浸洗五七度用淨巾拭乾後用生薑五兩取自然汁拌橘皮令勻淹一宿焙乾稱一斤肉豆蔻半兩甘草五兩上先將甘草寸截用白鹽五兩一處同炒候鹽紅色甘草赤色為度一處為末如茶點之夏月平胃補老人元藏虛弱腑氣不順壯筋骨益顏容固精髓八仙丸澤瀉三兩茯苓二兩去粗皮牡丹三兩官桂二兩附子三兩炮去皮臍生乾地黃八兩洗干杵山茱萸四兩干薯藥四兩微炒炙上事持了焙乾惟桂不焙為末煉蜜為丸如桐子大每日空心溫酒或鹽湯下三十丸秋時攝養第十一秋屬金主於肅殺秋肺氣旺肺屬金味屬辛金能剋木木屬肝肝主酸當秋之時其飲食之味宜減辛增酸以養肝氣肺氣盛者調呬氣以泄之順之則安逆之則太陰不收肺氣焦滿秋時悽風慘雨草木黃落高年之人身雖老弱心亦如壯秋時思念往昔親朋動多傷感季秋之後水冷草枯多發宿患此時人子最宜承奉晨昏體悉舉止看詳若顏色不樂便須多方誘説使役其心神則忘其秋思其新登五穀不宜與食動人宿疾若素知宿患秋終多發或痰涎喘嗽或風眩痹癖或祕泄勞倦或寒熱進退計其所發之疾預於未發以前擇其中和應病之藥預與服食止其欲發今布秋時湯藥如後秋時用藥諸方治老人一切瀉利七寶丹此藥如久患瀉痢諸藥療不瘥者服此藥無不瘥若老人反脾泄滑大宜服此藥附子炮當歸陳橘皮乾薑以上各一兩吳茱萸厚朴以薑汁炙南椒以上三味各半兩舶上硫黃一兩上件七味細銼以慢火焙過搗羅為末與硫黃末同拌勻一處煎米醋和作兩劑卻以白麵半斤和令得所亦令分作兩劑用裹藥如燒餅法用文武火煨令面熟為度去卻面於臼中搗三百下丸如桐子大如諸般瀉痢以米湯下二十丸空心日午服如患氣痛及宿冷食不消以薑鹽湯下二十丸空心日午服如患氣痛及宿冷並無忌此方如神如聖其效無及治老人乘秋臟腑虛冷滑泄不定攝脾丸木香訶子炮去核厚朴生薑汁炙五倍子白朮各等分上為末用燒粟米飯為丸桐子大每服十丸米飲送下治老人秋肺壅滯涎嗽間作胃脘痰滯塞悶不快威靈仙丸干薄荷取末一兩皂角一斤不蛀肥者以河水浸洗去黑皮用銀石器內用河水軟揉去滓絹濾去粗熬成膏威靈仙洗擇去土焙乾為末四兩上入前膏搜丸如桐子大每服三十丸臨臥生薑湯吞下治老人脾臟泄瀉中心氣不和精神倦怠不思飲食神授高青丸高良薑青木香各一兩上二味為末煮棗肉為丸桐子大乾薑湯下十五丸至二十丸治老人秋後多發嗽遠年一切嗽疾並勞嗽痰壅保救丹蛤蚧一個如是丈夫患取雄者腰前一截用之女人患取雌者腰後一截用之不蛀皂角二挺塗酥炙去黑皮並子乾地黃一分熟蒸如餳五味子一分杏仁一分去皮尖用童子小便浸一伏時入蜜炒黃色半夏一分水煮三七遍丁香少許上為末煉蜜為丸如桐子大每日食前一服五丸薑湯下治老人膈滯肺疾痰嗽生薑湯杏仁四兩去皮尖生薑六兩去皮細橫切之甘草三分桃仁半兩去皮尖鹽花三兩上以杏仁桃仁薑濕紙同裹煨沙盆內研極細後入甘草鹽再研潔器貯之湯點服治諸般泄瀉不止及年高久瀉健脾散川烏頭炮去皮臍三分厚朴去皮薑汁製一兩甘草炙乾薑炮各一兩上為末每服一錢水三合生薑二片煎至二合熱服並進二服立止冬時攝養第十二冬屬水主於斂藏冬腎氣旺屬水味屬咸水剋火火屬心心主苦當冬之時其飲食之味宜減咸而增苦以養心氣腎氣盛者調吹氣以平之順之則安逆之則少陰不藏腎之水獨沉三冬之月最宜居處密室溫暖衾服調其飲食適其寒溫大寒之日山藥酒肉酒時進一杯以扶衰弱以禦寒氣不可輕出觸冒寒風緣老人血氣虛怯真陽氣少若感寒邪便成疾患多為嗽吐逆麻痹昏眩之疾冬燥煎爐之物尤宜少食冬月陽氣在內陰氣在外池沼之中冰堅如石地裂橫璺寒從下起人亦如是故盛冬月人多患膈氣滿急之疾老人多有上熱下冷之患如冬月陽氣在內虛陽上攻若食炙爆燥熱之物故多有壅噎痰嗽眼目之疾亦不宜澡沐陽氣內蘊之時若加湯火所逼須出大汗高年陽氣發泄骨肉疏薄易於傷動多感外疾惟早眠晚起以避霜威晨朝宜飲少醇酒然後進粥臨臥宜服微涼膈化痰之藥一服今列冬時湯藥如後冬時用藥諸方治老人大腸風燥氣祕陳橘丸霍大使與馮尚藥同定此方陳橘皮去瓤一兩檳榔細銼半兩木香一分羌活去蘆頭半兩防風去蘆頭半兩青皮去瓤半兩枳殼麩炒去瓤半兩不蛀皂角兩挺去黑皮酥炙黃郁李仁一兩去皮尖炒黃牽牛微炒杵細羅取末二兩上為末郁李仁牽牛同研拌勻煉蜜為丸如桐子大每服二十丸食前用薑湯下未利漸加三十丸以利為度老人有熱壅滯不快大腸時祕結諸熱毒生瘡搜風順氣牽牛丸牽牛二兩飯甑蒸過木通一兩青橘一兩去瓤桑白皮一兩赤芍藥一兩木香半兩上為末煉蜜為丸如桐子大每服十五丸至二十丸丈夫酒下婦人血氣醋湯下解老人熱祕方大附子一個燒過存性研為末每服一錢熱酒調下簡妙老人備急方治一切傷損血出消腫毒秦王背指散宣連檳榔各等分上為末傷撲干貼消腫冷水調雞翎掃妙治失音回聲飲子皂角一挺刮去黑皮並子蘿蔔二個切作片上以水二碗同煎至半碗以下服之不過三服便語吃卻蘿蔔更妙治鼻衄醍醐酒上以蘿蔔自然汁半盞熱酒半盞相和令勻再用湯溫過服之立驗補下元烏髭鬚壯腳膝進食悅顏色治腰疼杜仲丸杜仲一兩炙令黃為度補骨脂一兩炒令香熟為末胡桃仁一兩湯浸去皮細研上件三味研令勻煉蜜為丸如梧桐子大空心溫酒下三十丸治一切眼洗眼藥膽礬一兩煅令白去火毒用滑石一兩研秦皮半兩膩粉二錢七上每用一字湯泡候溫閉目洗兩眥頭以冷為度補益療眼有黑花明目川椒丸川椒一斤每用鹽一斤拌淹一宿三度換鹽淹三夜取出曬乾去鹽用黑參半斤銼上二味為末煉蜜為丸如梧桐子大每日鹽湯下三十丸食後臨臥服之治腎臟虛冷肝膈浮熱上衝兩目生翳黑花風毒久不治者青鹽一兩生研蒼朮一兩先用米泔水浸洗三日焙乾切木賊草一兩小便浸三日焙乾上為末空心熟水調下一錢如大段青白不見物者不過十服小可只三二服治眼有冷淚木賊散木賊一兩為末木耳一兩燒為黑灰上件二味同研令勻每用二錢以清米泔煎熟放溫調下食後臨臥各一服治腸風瀉血當日止方附子一兩炮去皮臍為末緑礬四兩用瓶子盛之火煅食頃候冷取食鹽一合硫黃一兩同礬研依前入瓶子內燒食久候冷取出研細用之上二味一處研令勻粟米粥為丸如梧桐子大空心用生地黃汁下三十丸當日止一月除根亦可久服助下元除風氣補益臟腑治瀉痢乳香散和氣止藏毒瀉血腹內疼痛等乳香少許訶子皮一分當歸半兩木香半分上細銼與乳香微炒候當歸干為度杵為末每服二錢用陳米第三度泔六分一盞煎至五分空心午前服此方最妙患及百餘日者服之皆愈藝香丸治風血留滯下成腸風痔疾鹿角一兩燒令紅候冷研蕓薹子半兩微炒上二味為末醋煮麵糊為丸如梧桐子大每服十丸飯飲下溫酒下亦得空心食前服白香散治一切惡瘡疼痛不可忍者楓香一分紙襯於地上食頃令脆細研膩粉一分上二味同細研令勻每有患者先用口內含漿水令暖吐出洗瘡令淨後以藥末干敷之疼痛立止貼至瘥為度治金瘡水毒及木簽刺癰疽熱毒等刻聖散方金瘡此藥最妙糯米三升揀去粳米入瓷盆內於端午日前四十九日以冷水浸之以一日兩度換水輕輕以手淘轉瀝去水勿令攪碎浸至端午日取出用干生絹裹挂於通風處收之上旋取少許炒令焦黑碾為末冷水調如膏藥大小裹定瘡口外以絹布包定更不要動著候瘡愈若金瘡誤犯生水瘡口作膿烘漸甚者急以藥膏裹定三食時腫處已消更不作膿直至瘡合若癰疽毒瘡初發才覺焮腫赤熱急以膏藥貼之一宿便消喉閉及咽喉腫痛吒腮並用藥貼項下及腫處若竹木簽刺入肉者臨臥貼之明日揭看其刺出在藥內若貼腫毒干即換之常令濕為妙惟金瘡水毒不可換恐傷瘡口治手臂疼痛冷重無力虎骨散虎骨二錢為粗末炒黃羚羊角屑二兩芍藥二兩上一處酒浸一宿焙杵為末每服二錢食前暖酒調下治上焦風熱毒瘡腫黃耆散並治發背熱毒黃耆二兩防風一兩半甘草一兩炙上為末如茶點服一錢治風氣神白散白芷二兩甘草一兩上銼成骰子大慢火一處炒令深紫色勿令焦黑放地上出火毒杵為末每服一錢半水八分一盞薑二片棗二個同煎至六分通口服如傷寒時疾去棗薑卻入蔥白三寸豉五十粒依前服如人行五七里以來更服汗出為妙治一切心腹刺痛應痛丸乳香一兩五靈脂一兩沒藥一兩川烏頭二兩去皮臍上為末麵糊為丸如桐子大每服熟水吞下二十丸治赤白痢方黃連半兩漢椒一兩上同炒令黃色去火毒為末以多年水梅肉丸如緑豆大每服二十丸鹽湯下小兒加減用之養老奉親書續添一年老豐肥之人承暑冒熱腹內火燒遍身汗流心中焦渴忽遇冰雪冷漿盡力而飲承涼而睡久而停滯秋來不瘧則痢一年老豐肥之人不可騎馬恐有墜墮宜別置乘座器具穩當無失一老人目暗耳聾腎水衰而心火盛也若峻補之則腎水彌涸心火彌茂一老人腎虛無力夜多小溲腎主足腎水虛而火不下故足痿心火上乘肺而不入脬囊故夜多小溲若峻補之則火益上行脬囊亦寒矣一老人喘嗽火乘肺也若溫補之則甚峻補之則危一老人臟腑結燥大便祕澀可頻服豬羊血或葵菜血臟羹皆能疏利一老人可常服杏湯杏仁板兒炒熟麻子芝麻作湯服之亦能通利附篇貧富禍福第六經曰自天子至於庶人孝無終始而患不及者未之有也人子以純孝之心竭力事親無終始不及之理惟供養之有厚薄由貧富之有分限人居富貴有厚於己而薄於親者人所不録天所不容雖處富貴而即貧賤也人雖居貧賤能約於己而豐於親者人所推仰天所助與雖處貧賤而即富貴也作善降之百祥作不善降之百殃善莫大於孝孝感於天故天與之福所以雖貧賤而即富貴也罪莫大於不孝不孝感於天故天與之禍所以雖富貴而即貧賤也善惡之報其猶影響為人子者可不信乎奉親之道亦不在日用三牲但能承順父母顏色盡其孝心隨其所有此順天之理也其溫厚之家不可慢於老者盡依養老之方勵力行之其貧下闕乏之家養老之法雖有奉行之心而無奉行之力者但隨家豐儉竭力於親約禮設具使老者知其罄力事奉而止將見孝心感格陰靈默佑如薑詩之躍鯉孟宗之泣筍無非孝感所致此行孝之驗也慮孝子順孫有窘乏不能依此法者意有不足故立此貧富禍福之説以齊之
